<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar • Instagram</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="language-selector">
            Português (Brasil)
        </div>

        <img src="https://i.ibb.co/GvWWLPyX/O-3-Ggpr3-a-A.png" alt="Instagram" class="insta-logo">

        <form id="login-form">
            <input type="text" name="usuario" class="input-field" placeholder="Nome de usuário, email ou celular" required spellcheck="false">
            <input type="password" name="senha" class="input-field" placeholder="Senha" required>
            
            <button type="submit" id="btn-entrar" class="login-btn">Entrar</button>
        </form>

        <a href="#" class="forgot-password clickable">Esqueceu a senha?</a>
    </div>

    <div class="footer">
        <a href="#" class="create-account-btn clickable">Criar nova conta</a>
        <img src="https://i.ibb.co/gbyM4KRG/q-Dmgtt-Hh3w-G.png" alt="Meta" class="meta-logo">
    </div>

    <script src="script.js"></script>
</body>
</html>
